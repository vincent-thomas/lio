language = "C"
include_guard = "LIO_H"
cpp_compat = true
autogen_warning = "/* THIS FILE IS AUTO-GENERATED BY cbindgen — DO NOT EDIT MANUALLY */"
no_includes = true

after_includes = """
#include <stddef.h>
#include <stdint.h>
#include <sys/socket.h>
#ifndef __cplusplus
typedef struct sockaddr sockaddr;
typedef struct sockaddr_storage sockaddr_storage;
#endif
"""

[export]

[parse]
parse_deps = false
