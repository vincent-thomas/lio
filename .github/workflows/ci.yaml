name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: (main) Lint full
        if: github.ref != 'refs/heads/main'
        run: make lint-full

      - name: (not main) Lint
        if: github.ref == 'refs/heads/main'
        run: make lint

  lio-cbuild:
    name: C build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: test cbuild
        run: make test-ffi

  lio-build-n-test:
    name: Build n Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: Run test
        run: make test

  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flake-checker-action@main

  vm-test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [nix-flake-check, lio-build-n-test, lio-cbuild, lint]
    strategy:
      matrix:
        include:
          - name: Linux VM - io_uring
            vm: linux
          - name: FreeBSD VM - kqueue
            vm: freebsd
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache VM images
        uses: actions/cache@v4
        with:
          path: ~/.cache/lio-vm
          key: vm-${{ matrix.vm }}-${{ hashFiles(format('vm/{0}/run.sh', matrix.vm)) }}
          restore-keys: vm-${{ matrix.vm }}-

      - name: Run VM tests
        run: nix run .#${{ matrix.vm }}
