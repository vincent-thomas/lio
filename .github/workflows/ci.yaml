name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Check fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: Lint
        run: make lint

  lio-cbuild:
    name: C build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: Run make lio-cbuild
        run: make cbuild
      - run: ./lio/tests/nix-build/test.sh

  lio-build-n-test:
    name: Build n Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-cache

      - name: Run test
        run: make test

  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flake-checker-action@main

  vm-linux:
    name: Test (Linux VM - io_uring)
    runs-on: ubuntu-latest
    needs: [nix-flake-check, lio-build-n-test, lio-cbuild, lint]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache VM images
        uses: actions/cache@v4
        with:
          path: ~/.cache/lio-vm
          key: vm-linux-${{ hashFiles('vm/linux/run.sh') }}
          restore-keys: vm-linux-

      - name: Run Linux VM tests
        run: nix run .#linux

  vm-freebsd:
    name: Test (FreeBSD VM - kqueue)
    runs-on: ubuntu-latest
    needs: [nix-flake-check, lio-build-n-test, lio-cbuild, lint]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache VM images
        uses: actions/cache@v4
        with:
          path: ~/.cache/lio-vm
          key: vm-freebsd-${{ hashFiles('vm/freebsd/run.sh') }}
          restore-keys: vm-freebsd-

      - name: Run FreeBSD VM tests
        run: nix run .#freebsd
